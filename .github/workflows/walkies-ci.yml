name: Walkies CI

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-branch-name:
    name: Check Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          echo "Branch name: $BRANCH"
          if [[ "$BRANCH" == "master" ]]; then
            echo "Master branch - skipping name check"
            exit 0
          fi
          if [[ ! "$BRANCH" =~ ^(feature|fix|chore|hotfix|docs|test)/.+ ]]; then
            echo "ERROR: Branch '$BRANCH' does not follow naming convention"
            echo "Must start with: feature/, fix/, chore/, hotfix/, docs/, or test/"
            exit 1
          fi
          echo "Branch name is valid"

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: check-branch-name

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Walkies.API
        run: dotnet restore Walkies.API/Walkies.API.csproj

      - name: Restore Walkies.Tests
        run: dotnet restore Walkies.Tests/Walkies.Tests.csproj

      - name: Check code formatting
        run: dotnet format Walkies.API/Walkies.API.csproj --verify-no-changes --verbosity diagnostic

  dependency-security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: check-branch-name

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Walkies.API
        run: dotnet restore Walkies.API/Walkies.API.csproj

      - name: Restore Walkies.Tests
        run: dotnet restore Walkies.Tests/Walkies.Tests.csproj

      - name: Scan for vulnerable dependencies
        run: |
          echo "Scanning Walkies.API for vulnerable dependencies..."
          API_RESULT=$(dotnet list Walkies.API/Walkies.API.csproj package --vulnerable --include-transitive)
          echo "$API_RESULT"
          echo "Scanning Walkies.Tests for vulnerable dependencies..."
          TEST_RESULT=$(dotnet list Walkies.Tests/Walkies.Tests.csproj package --vulnerable --include-transitive)
          echo "$TEST_RESULT"
          if echo "$API_RESULT$TEST_RESULT" | grep -q "has the following vulnerable packages"; then
            echo "ERROR: Vulnerable packages detected — pipeline blocked"
            exit 1
          fi
          echo "No vulnerable packages found"

  build-api-and-tests:
    name: Build API and Tests
    runs-on: ubuntu-latest
    needs: [check-branch-name, code-quality, dependency-security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Walkies.API
        run: dotnet restore Walkies.API/Walkies.API.csproj

      - name: Restore Walkies.Tests
        run: dotnet restore Walkies.Tests/Walkies.Tests.csproj

      - name: Build Walkies.API
        run: dotnet build Walkies.API/Walkies.API.csproj --no-restore --configuration Release

      - name: Build Walkies.Tests
        run: dotnet build Walkies.Tests/Walkies.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        env:
           JwtSettings__SecretKey: ${{ secrets.JWT_SECRET_KEY }}
        run: dotnet test Walkies.Tests/Walkies.Tests.csproj --no-build --configuration Release --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx

  build-maui-android:
    name: Build MAUI Android
    runs-on: ubuntu-latest
    needs: build-api-and-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore Walkies.MAUI
        run: dotnet restore Walkies.MAUI/Walkies.MAUI.csproj

      - name: Build Walkies.MAUI Android
        run: dotnet build Walkies.MAUI/Walkies.MAUI.csproj --no-restore --configuration Release -f net10.0-android

  build-maui-windows:
    name: Build MAUI Windows
    runs-on: windows-latest
    needs: build-api-and-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Restore Walkies.MAUI Windows only
        run: dotnet restore Walkies.MAUI/Walkies.MAUI.csproj -p:TargetFrameworks=net10.0-windows10.0.19041.0 -r win-x64

      - name: Build Walkies.MAUI Windows
        run: dotnet build Walkies.MAUI/Walkies.MAUI.csproj --no-restore --configuration Release -f net10.0-windows10.0.19041.0 -r win-x64 --self-contained false

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build-api-and-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install CycloneDX SBOM tool
        run: dotnet tool install --global CycloneDX --version 6.1.1

      - name: Restore Walkies.API
        run: dotnet restore Walkies.API/Walkies.API.csproj

      - name: Generate SBOM for Walkies.API
        run: dotnet CycloneDX Walkies.API/Walkies.API.csproj -o sbom --output-format json

      - name: Upload SBOM artefact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: windows-latest
    needs: build-api-and-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --version 9.0.0 --tool-path ${{ runner.temp }}\scanner

      - name: Install MAUI Windows workload
        shell: powershell
        run: dotnet workload install maui-windows

      - name: Restore solution
        shell: powershell
        run: |
          dotnet restore Walkies.API/Walkies.API.csproj
          dotnet restore Walkies.Tests/Walkies.Tests.csproj
          dotnet restore Walkies.MAUI/Walkies.MAUI.csproj -p:TargetFrameworks=net10.0-windows10.0.19041.0 -r win-x64

      - name: Run tests with coverage
        env:
           JwtSettings__SecretKey: ${{ secrets.JWT_SECRET_KEY }}
        shell: powershell
        run: dotnet test Walkies.Tests/Walkies.Tests.csproj --configuration Release --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Build and analyse
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"Simonrps_Walkies" /o:"simonrps" /d:sonar.token="$env:SONAR_TOKEN"
          dotnet build Walkies.API/Walkies.API.csproj --configuration Release
          dotnet build Walkies.Tests/Walkies.Tests.csproj --configuration Release
          dotnet build Walkies.MAUI/Walkies.MAUI.csproj --configuration Release -f net10.0-windows10.0.19041.0 -r win-x64 --self-contained false
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
