name: Walkies CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore Walkies.API/Walkies.API.csproj

    - name: Build API
      run: dotnet build Walkies.API/Walkies.API.csproj --no-restore --configuration Release

    - name: Run Tests
      run: dotnet test Walkies.Tests/Walkies.Tests.csproj --configuration Release --verbosity normal
